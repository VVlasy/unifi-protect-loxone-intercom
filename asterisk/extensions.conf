;==============================================================================
; extensions.conf  (extension rendered at start from DOORBELL_EXTENSION)
;
; The Loxone "Audio username" must be set to EXACTLY this extension. Only this
; one number reaches the doorbell; anything else is rejected (404), which keeps
; SIP scanners that INVITE random numbers off the talkback. The default is 9900;
; if you expose SIP to the internet, set DOORBELL_EXTENSION to a longer,
; non-obvious number (and use the same value as the Loxone "Audio username").
;==============================================================================

[globals]

[from-loxone]
exten => __DOORBELL_EXTENSION__,1,NoOp(Loxone -> UniFi doorbell talk session)
 same => n,Stasis(doorbellbridge,call)
 same => n,Hangup()
