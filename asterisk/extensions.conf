;==============================================================================
; extensions.conf
;
; The Loxone "Audio username" must be set to EXACTLY the extension below. SIP is
; publicly exposed, so the old _X. catch-all (any number -> doorbell) is removed:
; only this one non-obvious number reaches the doorbell; anything else is rejected
; (404), which keeps SIP scanners that INVITE random numbers off the talkback.
;==============================================================================

[globals]

[from-loxone]
; Doorbell extension. Loxone "Audio username" (local AND external) = 380045110.
exten => 380045110,1,NoOp(Loxone -> UniFi doorbell talk session)
 same => n,Stasis(doorbellbridge,call)
 same => n,Hangup()
