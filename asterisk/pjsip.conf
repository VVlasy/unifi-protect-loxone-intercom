;==============================================================================
; pjsip.conf
;
; Purpose: accept the ANONYMOUS SIP call the Loxone app makes (no registration,
; no password) and hand it to the [from-loxone] dialplan context.
;
; The Loxone app is NOT a full SIP client. It sends an unauthenticated INVITE
; straight to this Asterisk box. PJSIP routes any unidentified inbound request
; to the special endpoint literally named "anonymous" (if one exists), so that
; is what we define below.
;==============================================================================

[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:5060
; This default is for LAN / VPN use (the Loxone app and Asterisk on the same
; private network). To let the Loxone app call in from OFF the LAN without a VPN,
; you must advertise your public address here (external_media_address /
; external_signaling_address + local_net) and port-forward 5060/udp and
; 10000-10200/udp. See ADVANCED.md > "Remote access".

;------------------------------------------------------------------------------
; Anonymous inbound endpoint (this is the Loxone call)
;------------------------------------------------------------------------------
[anonymous]
type = endpoint
context = from-loxone
disallow = all
allow = ulaw,alaw            ; G.711 - exactly what the Loxone app offers
direct_media = no            ; force RTP through Asterisk (needed for the bridge)
rtp_symmetric = yes          ; learn the phone's real RTP source (NAT-safe)
force_rport = yes
rewrite_contact = yes
dtmf_mode = rfc4733          ; lets a Loxone "door open" button send DTMF later
