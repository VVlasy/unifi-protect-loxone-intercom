#==============================================================================
# Proxmox / any Docker host.
#
# host networking is REQUIRED. SIP advertises IP/ports inside SDP and RTP is
# symmetric; behind Docker's NAT bridge the audio silently breaks. With
# network_mode: host the container uses the host's LAN IP directly - which is
# also the IP you give Loxone as "Host for audio".
#==============================================================================
services:
  doorbell-bridge:
    build: .
    # Or use a prebuilt image instead of build:
    # image: your-registry/unifi-loxone-doorbell:latest
    container_name: unifi-loxone-doorbell
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    # Everything is rendered at boot from .env; nothing needs to be persisted.
    # (If you set up the optional fail2ban SIP protection in ADVANCED.md, add a
    #  bind mount here to expose Asterisk's security log:
    #    volumes:
    #      - ./asterisk-log:/var/log/asterisk )
